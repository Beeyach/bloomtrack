name = "bloomwired-review"
main = "src/index.js"
compatibility_date = "2024-01-01"

[[r2_buckets]]
binding = "PDF_BUCKET"
bucket_name = "bloomwired-pdfs"

# UPLOAD_SECRET is intentionally NOT declared under [vars].
# A plaintext var of the same name collides with the secret and would also
# commit the value to git. Set it once with:
#   wrangler secret put UPLOAD_SECRET

# ── Routing ──────────────────────────────────────────────────────────────
# Custom domain file.gobloomwired.com is attached via the Cloudflare
# dashboard (Workers → bloomwired-review → Settings → Domains & Routes).
# No route config needed here — the custom domain handles it.
